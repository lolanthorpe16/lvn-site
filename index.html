<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <nav>
        <div class="logo">LVN</div>
        <ul>
            <li><a href="#shop">Shop</a></li>
            <li><a href="#about">Our Story</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    <section class="hero">

            </div>

            <div class="item">
                <img src="images/Screenshot 2026-05-08 162229.png" alt="Jewellery Piece 4" class="product-photo">
